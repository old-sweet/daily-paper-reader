  schema: public
subscriptions:
  schema_migration:
    stage: A
    diff_threshold_pct: 15
  keyword_recall_mode: or
  intent_profiles:
    - tag: LLM-HW-FV
      description: 搜索关于大语言模型在硬件形式验证中应用的论文。
      enabled: true
      paper_sources:
        - arxiv
        - biorxiv
      keywords:
        - keyword: large language model
          keyword_cn: 大语言模型
          query: large language model for hardware formal verification
        - keyword: hardware formal verification
          keyword_cn: 硬件形式验证
          query: hardware formal verification using large language models
        - keyword: RTL verification
          keyword_cn: RTL验证
          query: RTL verification with LLMs
      intent_queries:
        - query: What are the latest advances in applying LLMs to formal verification of RTL designs?
          query_cn: 将大语言模型应用于RTL设计形式验证的最新进展是什么？
          enabled: true
          source: manual
          note: ''
        - query: Can LLMs assist in model checking and theorem proving for hardware design?
          query_cn: 大语言模型能否协助硬件设计中的模型检验和定理证明？
          enabled: true
          source: manual
          note: ''
      updated_at: '2026-06-03T06:30:49.484Z'
    - tag: ml-verify
      description: 搜索关于非LLM的AI和机器学习方法在硬件验证和形式验证中的应用论文。
      enabled: true
      paper_sources:
        - arxiv
        - biorxiv
      keywords:
        - keyword: machine learning hardware verification
          keyword_cn: 机器学习硬件验证
          query: machine learning applied to hardware verification and formal verification
        - keyword: reinforcement learning model checking
          keyword_cn: 强化学习模型检验
          query: reinforcement learning for model checking and formal verification
        - keyword: search-based RTL verification
          keyword_cn: 基于搜索的RTL验证
          query: search-based methods for RTL verification and hardware verification
        - keyword: AI-guided verification tool
          keyword_cn: AI引导的验证工具
          query: AI-guided selection and improvement of verification tools
      intent_queries:
        - query: machine learning improves model checking and formal verification of hardware designs
          query_cn: 机器学习改进硬件设计的模型检验和形式验证
          enabled: true
          source: manual
          note: ''
        - query: reinforcement learning for SAT solving and theorem proving in hardware verification
          query_cn: 强化学习用于硬件验证中的SAT求解和定理证明
          enabled: true
          source: manual
          note: ''
        - query: graph neural network for equivalence checking and verification tool selection
          query_cn: 图神经网络用于等价性检查和验证工具选择
          enabled: true
          source: manual
          note: ''
        - query: AI driven techniques for RTL verification and assertion property checking
          query_cn: AI驱动的RTL验证和断言属性检查技术
          enabled: true
          source: manual
          note: ''
      updated_at: '2026-06-03T06:31:46.693Z'
    - tag: fsh
      description: 搜索混合硬件验证方法以及可迁移到硬件验证的软件验证技术。
      enabled: true
      paper_sources:
        - arxiv
        - biorxiv
      keywords:
        - keyword: hardware verification
          keyword_cn: 硬件验证
          query: hardware verification techniques for digital circuits
        - keyword: symbolic execution hardware
          keyword_cn: 符号执行硬件
          query: symbolic execution applied to hardware design verification
        - keyword: fuzzing hardware
          keyword_cn: 模糊测试硬件
          query: fuzzing techniques for hardware verification
        - keyword: hybrid verification methods
          keyword_cn: 混合验证方法
          query: hybrid verification combining formal and simulation methods
        - keyword: counterexample-guided synthesis hardware
          keyword_cn: 反例引导合成硬件
          query: counterexample-guided inductive synthesis for hardware verification
        - keyword: abstract interpretation hardware
          keyword_cn: 抽象解释硬件
          query: abstract interpretation applied to hardware verification
      intent_queries:
        - query: What papers combine formal verification with simulation for hardware verification?
          query_cn: 哪些论文结合了形式验证与模拟用于硬件验证？
          enabled: true
          source: manual
          note: ''
        - query: >-
            How are software verification techniques like symbolic execution and fuzzing adapted to hardware design
            verification?
          query_cn: 软件验证技术如符号执行和模糊测试如何适配到硬件设计验证？
          enabled: true
          source: manual
          note: ''
        - query: >-
            What are the hybrid methods that integrate model checking with emulation or runtime verification for digital
            circuits?
          query_cn: 哪些混合方法将模型检验与仿真或运行时验证集成用于数字电路？
          enabled: true
          source: manual
          note: ''
      updated_at: '2026-06-03T06:32:33.531Z'
